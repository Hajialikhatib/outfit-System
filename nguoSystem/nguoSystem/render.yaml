################################################################################
# render.yaml  –  Render.com IaC blueprint
# Docs: https://render.com/docs/blueprint-spec
#
# Services defined here:
#   1. nguoSystem-api   – Django / Gunicorn web service (backend)
#   2. nguoSystem-web   – Vite React static site   (frontend)
#   3. nguoSystem-db    – PostgreSQL managed database
################################################################################

databases:
  - name: nguoSystem-db
    databaseName: nguosystem
    user: nguosystem_user
    plan: free                 # upgrade to "starter" for production persistence

services:
  # ─── Backend: Django API ──────────────────────────────────────────────────
  - type: web
    name: nguoSystem-api
    runtime: python
    plan: free                 # or "starter" / "standard" for production
    region: oregon             # change to the region closest to your users
    rootDir: nguoSystem/nguoSystem/backend

    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput

    startCommand: >
      gunicorn nguoSystem.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --threads 2
      --timeout 120
      --log-level warning

    healthCheckPath: /api/

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: nguoSystem.deployment

      - key: SECRET_KEY
        generateValue: true        # Render generates a secure random value

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: ".onrender.com"

      - key: DATABASE_URL
        fromDatabase:
          name: nguoSystem-db
          property: connectionString

      # Your Render frontend URL (fill in after first deploy)
      - key: CORS_ALLOWED_ORIGINS
        value: "https://nguosystem-web.onrender.com"

      - key: CSRF_TRUSTED_ORIGINS
        value: "https://nguosystem-web.onrender.com"

      - key: MEDIA_ROOT
        value: /opt/render/project/src/media

      - key: PYTHON_VERSION
        value: "3.11.0"

  # ─── Frontend: React / Vite static site ───────────────────────────────────
  - type: web
    name: nguoSystem-web
    runtime: static
    plan: free
    region: oregon
    rootDir: nguoSystem/nguoSystem/frontend

    buildCommand: npm ci && npm run build

    staticPublishPath: dist

    # SPA redirects – send all 404s back to index.html for React Router
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # Point the React app at the backend API
      - key: VITE_API_URL
        value: "https://nguosystem-api.onrender.com"
